<div class="fixed top-4 right-4 z-50">
  <button (click)="toggleTheme()"
    class="w-12 h-12 flex items-center justify-center bg-white/50 dark:bg-slate-800/50 backdrop-blur-md rounded-full shadow-lg border border-white/40 dark:border-slate-700 hover:scale-110 active:scale-95 transition-all text-2xl group">
    @if (isDarkMode()) {
    <span class="group-hover:rotate-180 transition-transform duration-500">☀️</span>
    } @else {
    <span class="group-hover:-rotate-12 transition-transform duration-500">🌙</span>
    }
  </button>
</div>

<router-outlet></router-outlet>
