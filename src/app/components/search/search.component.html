<div class="relative w-full max-w-md mx-auto z-50">
    <div
        class="relative flex items-center w-full h-12 rounded-full focus-within:shadow-lg bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-slate-200 dark:border-slate-700/50 overflow-hidden transition-all duration-300">
        <div class="grid place-items-center h-full w-12 text-slate-400 dark:text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        <input
            class="peer h-full w-full outline-none text-sm text-slate-700 dark:text-slate-200 dark:placeholder-slate-400 pr-10 bg-transparent"
            type="text" id="search" placeholder="Search for a city..." [(ngModel)]="searchQuery"
            (ngModelChange)="onSearchInput($event)" (focus)="showDropdown.set(true)" (blur)="onBlur()"
            autocomplete="off" />

        <div class="absolute right-3 grid place-items-center h-full">
            @if (isLoading()) {
            <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-primary-500 dark:border-primary-400"></div>
            } @else if (searchQuery) {
            <button (mousedown)="$event.preventDefault(); clearSearch()"
                class="text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300 transition-colors p-1 rounded-full outline-none focus:ring-2 focus:ring-primary-500/50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            }
        </div>
    </div>

    @if (showDropdown() && results().length > 0) {
    <div
        class="absolute w-full mt-2 bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 max-h-64 overflow-y-auto overflow-x-hidden animate-slideIn transition-colors duration-300">
        <ul class="py-2">
            @for (city of results(); track city.id) {
            <li class="px-5 py-3 hover:bg-slate-50 dark:hover:bg-slate-700/50 cursor-pointer flex items-center justify-between transition-colors group border-b border-slate-50 dark:border-slate-700/50 last:border-0"
                (mousedown)="selectCity(city)">
                <div>
                    <p
                        class="text-sm font-medium text-slate-800 dark:text-slate-200 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors">
                        {{city.name}}</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">{{city.admin1 ? city.admin1 + ',' : ''}}
                        {{city.country}}</p>
                </div>
            </li>
            }
        </ul>
    </div>
    }
</div>
