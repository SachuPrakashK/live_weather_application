<main
    class="min-h-screen bg-transparent relative overflow-hidden py-10 px-4 sm:px-6 lg:px-8 flex flex-col items-center">
    <!-- Background elements -->
    <div
        class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-teal-100 dark:bg-teal-900/40 rounded-full blur-[100px] opacity-40 mix-blend-multiply dark:mix-blend-screen pointer-events-none transition-colors duration-500">
    </div>
    <div
        class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-100 dark:bg-blue-900/40 rounded-full blur-[100px] opacity-40 mix-blend-multiply dark:mix-blend-screen pointer-events-none transition-colors duration-500">
    </div>

    <div class="w-full max-w-5xl mx-auto flex flex-col gap-10 z-10 relative">
        <header class="text-center space-y-4 pt-4 md:pt-10">
            <div
                class="inline-flex items-center justify-center p-3 bg-white/60 dark:bg-slate-800/60 backdrop-blur-sm rounded-2xl shadow-sm border border-white/40 dark:border-slate-700/50 mb-2 transition-colors duration-500">
                <span class="text-3xl filter drop-shadow-sm">⛅</span>
            </div>
            <h1
                class="text-4xl md:text-6xl font-extrabold text-slate-800 dark:text-white tracking-tight transition-colors duration-500">
                Aura <span
                    class="bg-clip-text text-transparent bg-gradient-to-r from-primary-500 to-blue-500 dark:from-primary-400 dark:to-blue-400">Weather</span>
            </h1>
            <p
                class="text-slate-500 dark:text-slate-300 max-w-lg mx-auto md:text-lg font-light tracking-wide transition-colors duration-500">
                Real-time weather data and 7-day forecast for any city worldwide, packed in a modern, elegant
                experience.
            </p>
        </header>

        <section class="max-w-2xl mx-auto w-full px-2">
            <app-search></app-search>
        </section>

        @if (errorMsg()) {
        <div
            class="max-w-md mx-auto w-full bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 p-4 rounded-2xl border border-red-100 dark:border-red-800/30 text-center animate-shake transition-colors duration-500">
            <span class="text-xl inline-block mb-1">⚠️</span>
            <p class="font-medium text-sm">{{errorMsg()}}</p>
        </div>
        }

        @if (!errorMsg()) {
        <section class="w-full space-y-8 animate-fade pb-10">
            <app-current-weather [weatherData]="weather()" [cityData]="city()" [isLoading]="isLoading()">
            </app-current-weather>

            <app-forecast [weatherData]="weather()" [isLoading]="isLoading()">
            </app-forecast>
        </section>
        }
    </div>

    <footer
        class="mt-auto pt-10 pb-6 w-full text-center text-slate-400 dark:text-slate-500 text-sm z-10 relative transition-colors duration-500">
        <p>Aura Weather &copy; 2026</p>
        <p class="mt-1 text-xs opacity-75">Designed for a seamless and beautiful real-time weather tracking experience.
        </p>
    </footer>
</main>
